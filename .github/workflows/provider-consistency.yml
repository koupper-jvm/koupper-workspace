name: Provider Consistency

on:
  pull_request:
    branches: [develop]

concurrency:
  group: provider-consistency-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  providers-core:
    name: Providers core consistency
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout koupper (develop)
        uses: actions/checkout@v4
        with:
          repository: koupper-jvm/koupper
          ref: develop
          path: koupper

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        shell: bash
        run: chmod +x ./koupper/gradlew

      - name: Run provider consistency tests
        shell: bash
        run: |
          set -euo pipefail
          (cd koupper && ./gradlew :providers:test --tests "com.koupper.providers.ProviderCatalogConsistencyTest" --tests "com.koupper.providers.command.CommandRunnerServiceProviderTest")

  providers-cli:
    name: Providers CLI consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout koupper-cli (develop)
        uses: actions/checkout@v4
        with:
          repository: koupper-jvm/koupper-cli
          ref: develop
          path: koupper-cli

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        shell: bash
        run: chmod +x ./koupper-cli/gradlew

      - name: Run CLI provider catalog tests
        shell: bash
        run: |
          set -euo pipefail
          (cd koupper-cli && ./gradlew test --tests "com.koupper.cli.commands.ProviderCommandCatalogPathTest")

